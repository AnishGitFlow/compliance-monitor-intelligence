name: Daily Compliance Report

on:
  schedule:
  # Runs every day at 23:30 UTC
  # (05:00 AM IST)
  - cron: '30 23 * * *'

  workflow_dispatch:

concurrency:
  group: compliance-monitor
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest || echo "No tests found"

      - name: Create .env File
        run: |
          echo "SERPER_API_KEY=${{ secrets.SERPER_API_KEY }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "GEMINI_MODEL=${{ secrets.GEMINI_MODEL }}" >> .env
          echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> .env
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env
          echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" >> .env
          echo "REPORT_TO=${{ secrets.REPORT_TO }}" >> .env
          echo "REPORT_FROM=${{ secrets.REPORT_FROM }}" >> .env

      - name: Run Intelligence Pipeline
        run: |
          python main.py

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: |
            reports/
            data/
            *.csv
            *.json
            *.md

      - name: Commit Deduplication History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data/history.json

          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "Update deduplication history [skip ci]"
            git push
          fi

      - name: Workflow Summary
        run: |
          echo "Compliance monitoring pipeline completed successfully."
